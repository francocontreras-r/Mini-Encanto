*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Raleway',system-ui,sans-serif;background:#FF4713;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;}
.iso{height:64px;margin-bottom:16px;}
.wm{height:38px;margin-bottom:10px;}
.tag{font-size:12px;font-weight:800;letter-spacing:.34em;padding-left:.34em;opacity:.92;margin-bottom:26px;}
.title{font-family:'DP Script',cursive;font-size:clamp(40px,12vw,60px);line-height:.9;margin-bottom:6px;}
.sub{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.9;margin-bottom:30px;}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;}
.card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;color:#211f1d;
  text-decoration:none;padding:18px 22px;border-radius:16px;font-weight:800;font-size:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.14);transition:transform .12s;}
.card:active{transform:scale(.98);}
.card .emoji{font-size:24px;}
.card .go{color:#FF4713;font-size:22px;}
.hint{margin-top:26px;font-size:12px;opacity:.85;font-weight:600;max-width:320px;line-height:1.5;}
