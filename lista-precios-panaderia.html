:root{
  --naranja:#FF4713; --naranja-d:#E23A0C;
  --tinta:#1b1a19; --tinta2:#39352f;
  --paper:#ffffff; --cream:#f6f3ee; --row:#faf7f2; --rowalt:#f0ebe3;
  --line:#e7e0d6; --muted:#8f877d;
  --sans:'Raleway',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --script:'DP Script','Brush Script MT',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--cream);color:var(--tinta);font-family:var(--sans);
  -webkit-text-size-adjust:100%;font-weight:500;}
.wrap{max-width:840px;margin:0 auto;padding:14px 12px 64px;}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:8px;
  align-items:center;justify-content:center;padding:10px;margin:-14px -12px 16px;
  background:rgba(246,243,238,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.tbtn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--tinta);
  background:var(--paper);color:var(--tinta);font-weight:700;font-size:13.5px;font-family:var(--sans);
  padding:9px 15px;border-radius:999px;cursor:pointer;transition:.15s;letter-spacing:.01em;}
.tbtn:hover{background:var(--tinta);color:#fff;}
.tbtn.primary{background:var(--naranja);border-color:var(--naranja);color:#fff;}
.tbtn.primary:hover{background:var(--naranja-d);border-color:var(--naranja-d);}
.tbtn.on{background:var(--tinta);color:#fff;}
.hint{width:100%;text-align:center;font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}

/* Sheet */
.sheet{background:var(--paper);border-radius:18px;overflow:hidden;
  box-shadow:0 14px 46px rgba(27,26,25,.14);border:1px solid var(--line);}
.head{background:#fff;padding:30px 24px 20px;text-align:center;}
.head img{width:min(340px,80%);height:auto;display:block;margin:0 auto;}
.hero{background:var(--naranja);color:#fff;text-align:center;padding:20px 18px 26px;position:relative;}
.hero .lp{font-size:clamp(15px,3.6vw,20px);font-weight:800;letter-spacing:.32em;
  text-transform:uppercase;line-height:1;padding-left:.32em;}
.hero .cat{font-family:var(--script);font-size:clamp(42px,11vw,68px);line-height:.92;
  margin-top:6px;font-weight:400;text-shadow:0 2px 0 rgba(0,0,0,.06);}
.period-row{text-align:center;padding:16px 18px 2px;}
.period{display:inline-flex;align-items:center;gap:7px;border:2px solid var(--tinta);border-radius:999px;
  padding:6px 18px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:13px;}
.period::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--naranja);}
.subtitle{text-align:center;color:var(--muted);font-size:12px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;padding:6px 18px 4px;}
.monthpick{display:none;justify-content:center;gap:8px;padding:10px 18px 2px;flex-wrap:wrap;}
body.editing .monthpick{display:flex;}
.monthpick select,.monthpick input{font-family:var(--sans);font-weight:700;font-size:13px;
  padding:7px 10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--tinta);}
.monthpick input{width:84px;}

/* Sections */
.sections{padding:8px 14px 24px;}
.section{margin-top:16px;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.sec-head{background:var(--tinta);color:#fff;display:flex;align-items:center;
  justify-content:space-between;gap:10px;padding:11px 16px;border-left:5px solid var(--naranja);}
.sec-titles{display:flex;flex-direction:column;gap:2px;min-width:0;}
.sec-title{font-weight:800;letter-spacing:.09em;text-transform:uppercase;font-size:14px;}
.sec-sub{font-size:10.5px;color:#e9b9a6;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.colhead{display:flex;background:var(--rowalt);border-bottom:1px solid var(--line);
  font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.colhead .cname{flex:1;padding:8px 16px;}
.colhead .cprice{width:120px;padding:8px 12px;text-align:right;}
.rows{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row:nth-child(even){background:var(--row);}
.cell-name{flex:1;padding:12px 16px;font-size:14.5px;font-weight:600;min-width:0;color:var(--tinta2);}
.cell-price{width:120px;padding:12px 12px;text-align:right;font-size:14px;font-weight:800;
  font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--tinta);}
.cell-price.pub{color:var(--muted);font-weight:700;}
[contenteditable="true"]{outline:none;border-radius:6px;}
body.editing [contenteditable="true"]{box-shadow:inset 0 0 0 1.5px #f0b7a4;background:#fffaf7;cursor:text;color:var(--tinta);}
body.editing .sec-head [contenteditable="true"]{background:#fff;color:var(--tinta);border-radius:6px;padding:1px 6px;}

.del{display:none;border:none;background:none;color:var(--naranja-d);cursor:pointer;
  font-size:17px;line-height:1;padding:6px 12px;flex-shrink:0;}
body.editing .del{display:inline-block;}
.sec-del{display:none;border:1.5px solid #fff;background:transparent;color:#fff;
  border-radius:8px;cursor:pointer;font-size:11px;font-weight:800;padding:4px 9px;flex-shrink:0;
  text-transform:uppercase;letter-spacing:.05em;}
body.editing .sec-del{display:inline-block;}
.addrow,.addsec{display:none;width:100%;border:1.5px dashed var(--line);background:#fff;
  color:var(--muted);font-weight:800;font-size:12.5px;padding:11px;cursor:pointer;
  font-family:var(--sans);letter-spacing:.06em;text-transform:uppercase;}
.addrow:hover,.addsec:hover{border-color:var(--naranja);color:var(--naranja-d);}
body.editing .addrow{display:block;}
body.editing .addsec{display:block;margin-top:18px;border-radius:14px;}

.foot{text-align:center;color:var(--muted);font-size:11.5px;padding:18px 20px 4px;font-weight:600;
  letter-spacing:.03em;}
.foot b{color:var(--tinta2);font-weight:800;}
.foot .sep{color:var(--naranja);font-weight:800;}

@media(max-width:520px){
  .cell-price,.colhead .cprice{width:96px;}
  .cell-name,.cell-price{font-size:13px;}
  .cell-name{padding-left:12px;} .colhead .cname{padding-left:12px;}
}

@page{size:A4;margin:11mm;}
@media print{
  html,body{background:#fff;}
  .toolbar,.del,.sec-del,.addrow,.addsec,.monthpick{display:none !important;}
  .wrap{max-width:none;padding:0;}
  .sheet{box-shadow:none;border:none;border-radius:0;}
  .section{break-inside:avoid;page-break-inside:avoid;}
  .hero,.sec-head,.period::before,.period,.colhead,.row:nth-child(even),.foot .sep{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body.editing [contenteditable="true"]{box-shadow:none;background:transparent;}
}
</style>
</head>

const MESES = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

let data = load();
let editing = false;

function load(){ try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
function save(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){} }
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(){
  const colheadHTML = data.cols.map(c=>`<div class="cprice">${esc(c)}</div>`).join("");
  const secHTML = data.sections.map((sec,si)=>{
    const rows = sec.rows.map((r,ri)=>{
      const prices = r.prices.map((p,ci)=>{
        const isPub = data.cols.length>1 && ci>0;
        return `<div class="cell-price ${isPub?'pub':''}" data-si="${si}" data-ri="${ri}" data-ci="${ci}">${esc(p)}</div>`;
      }).join("");
      return `<div class="row">
        <div class="cell-name" data-si="${si}" data-ri="${ri}" data-field="name">${esc(r.name)}</div>
        ${prices}<button class="del" title="Eliminar" onclick="delRow(${si},${ri})">✕</button></div>`;
    }).join("");
    const subHTML = (sec.subtitle||editing)
      ? `<div class="sec-sub" data-si="${si}" data-field="subtitle">${esc(sec.subtitle||"")}</div>` : "";
    return `<div class="section">
      <div class="sec-head"><div class="sec-titles">
        <div class="sec-title" data-si="${si}" data-field="title">${esc(sec.title)}</div>${subHTML}
      </div><button class="sec-del" onclick="delSection(${si})">✕ Sección</button></div>
      <div class="colhead"><div class="cname">Producto</div>${colheadHTML}</div>
      <div class="rows">${rows}</div>
      <button class="addrow" onclick="addRow(${si})">＋ Agregar producto</button></div>`;
  }).join("");

  document.getElementById("sheet").innerHTML = `
    <div class="head"><img src="${LOCKUP}" alt="Del Parque · #ESTÁBUENÍSIMO"></div>
    <div class="hero"><div class="lp">Lista de Precios</div>
      <div class="cat">${esc(data.categoria)}</div></div>
    <div class="period-row"><span class="period" data-field="period">${esc(data.period)}</span></div>
    <div class="monthpick">
      <select id="mesSel" onchange="setMonth()">${MESES.map(m=>`<option ${data.period.toUpperCase().startsWith(m)?'selected':''}>${m}</option>`).join("")}</select>
      <input id="anioInp" type="number" min="2024" max="2099" value="${(data.period.match(/\d{4}/)||[new Date().getFullYear()])[0]}" onchange="setMonth()" oninput="setMonth()">
    </div>
    <div class="subtitle" data-field="subtitle-main">${esc(data.subtitle)}</div>
    <div class="sections">${secHTML}
      <button class="addsec" onclick="addSection()">＋ Agregar sección</button></div>`;
  applyEditable();
}
function setMonth(){
  const m=document.getElementById("mesSel").value;
  const y=document.getElementById("anioInp").value||"";
  data.period=(m+" "+y).trim(); save();
  document.querySelector(".period").innerText=data.period;
}
function applyEditable(){
  document.querySelectorAll("[data-field]:not(.period),[data-ci]").forEach(el=>{
    editing?el.setAttribute("contenteditable","true"):el.removeAttribute("contenteditable");
  });
  // period editable via picker in edit mode; keep pill non-editable to avoid double source
  const pill=document.querySelector(".period");
  if(pill) pill.removeAttribute("contenteditable");
}
document.addEventListener("input",e=>{
  const el=e.target; if(!el.getAttribute||!el.getAttribute("contenteditable"))return;
  const txt=el.innerText.replace(/\n/g," ").trim(); const f=el.dataset.field;
  if(f==="subtitle-main")data.subtitle=txt;
  else if(f==="title")data.sections[+el.dataset.si].title=txt;
  else if(f==="subtitle")data.sections[+el.dataset.si].subtitle=txt;
  else if(f==="name")data.sections[+el.dataset.si].rows[+el.dataset.ri].name=txt;
  else if(el.dataset.ci!==undefined)data.sections[+el.dataset.si].rows[+el.dataset.ri].prices[+el.dataset.ci]=txt;
  save();
});
function toggleEdit(){
  editing=!editing; document.body.classList.toggle("editing",editing);
  const b=document.getElementById("editBtn");
  b.textContent=editing?"✓ Listo":"✏️ Editar"; b.classList.toggle("on",editing);
  document.getElementById("hint").style.display=editing?"block":"none"; render();
}
function addRow(si){const n=data.cols.length;
  data.sections[si].rows.push({name:"Nuevo producto",prices:Array(n).fill(n>1?"—":"$ 0")});save();render();}
function delRow(si,ri){data.sections[si].rows.splice(ri,1);save();render();}
function addSection(){const n=data.cols.length;
  data.sections.push({title:"NUEVA SECCIÓN",subtitle:"",rows:[{name:"Nuevo producto",prices:Array(n).fill(n>1?"—":"$ 0")}]});save();render();}
function delSection(si){if(confirm("¿Eliminar la sección “"+data.sections[si].title+"”?")){data.sections.splice(si,1);save();render();}}
function resetAll(){if(confirm("¿Restablecer la lista a los valores originales? Se perderán tus cambios en este dispositivo.")){
  localStorage.removeItem(STORAGE_KEY);data=JSON.parse(JSON.stringify(DEFAULT_DATA));render();}}
function slug(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");}
function exportData(){
  const payload={_marca:"Del Parque",_tipo:"lista-precios",_rubro:data.categoria,...data};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="precios-"+slug(data.categoria)+"-"+slug(data.period)+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importData(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const j=JSON.parse(r.result);
    if(!j||!Array.isArray(j.sections)||!Array.isArray(j.cols)) throw new Error("formato");
    if(j._rubro && j._rubro!==data.categoria &&
       !confirm("El archivo es de “"+j._rubro+"”, no de “"+data.categoria+"”. ¿Importar igual?")){input.value="";return;}
    data={categoria:data.categoria,type:j.type||data.type,cols:j.cols,period:j.period||data.period,subtitle:j.subtitle||data.subtitle,sections:j.sections};
    save(); render(); alert("Lista importada correctamente ✔");
  }catch(e){ alert("No se pudo importar: el archivo no es una lista de precios válida."); }
  input.value=""; };
  r.readAsText(file);
}
document.getElementById("hint").style.display="none";
render();
</script>
</body>
</html>
